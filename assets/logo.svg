<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bagGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A7BD5"></stop>
      <stop offset="100%" stop-color="#2F5FA8"></stop>
    </linearGradient>
  </defs>

  <!-- Briefcase -->
  <rect x="40" y="80" width="176" height="110" rx="20" fill="url(#bagGradient)"></rect>

  <!-- Handle -->
  <rect x="95" y="60" width="66" height="20" rx="10" fill="#2F5FA8"></rect>

  <!-- Euro symbol -->
  <text x="128" y="150" font-size="72" font-family="Arial, Helvetica, sans-serif" font-weight="bold" text-anchor="middle" fill="white">€</text>

  <!-- Growth line -->
  <polyline points="70,170 100,150 130,160 165,130 195,120" fill="none" stroke="#8FE388" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></polyline>

</svg>